{% extends 'mainApp/base.html' %}
{% load static %}

{% block title %}Google{% endblock %}

{% block body %}
<div class="home-wrapper">

    <nav class="top-nav">
        <div class="top-nav-links">
            <a href="https://mail.google.com" target="_blank">Gmail</a>
            <a href="https://www.google.com/imghp" target="_blank">Images</a>
            <button class="icon-btn" title="Google apps">
                <span class="material-symbols-outlined">apps</span>
            </button>
            <a href="https://accounts.google.com" target="_blank" class="signin-btn">Sign in</a>
        </div>
    </nav>

    <main class="home-main">
        <div class="logo-container">
            <img src="{% static 'images/google-logo.png' %}" alt="Google" class="google-logo">
        </div>

        <form class="search-form" action="https://www.google.com/search" method="GET" target="_blank">
            <div class="search-bar">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" name="q" class="search-input" autocomplete="off" aria-label="Search">
                <div class="search-bar-icons">
                    <button type="button" class="icon-btn" title="Search by voice">
                        <img src="{% static 'images/mircophone.png' %}" alt="Search by voice" class="bar-icon">
                    </button>
                    <button type="button" class="icon-btn" title="Search by image">
                        <img src="{% static 'images/camera.png' %}" alt="Search by image" class="bar-icon">
                    </button>
                </div>
            </div>

            <div class="search-buttons">
                <button type="submit" class="search-btn">Google Search</button>
                <button type="button" class="search-btn" onclick="luckySearch()">I'm Feeling Lucky</button>
            </div>
        </form>

        <div class="language-line">
            Google offered in: <a href="#">العربية</a>
        </div>
    </main>

    <footer class="home-footer">
        <div class="footer-top">
            <span>Saudi Arabia</span>
        </div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="{% url 'mainApp:terms' %}">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>
</div>

<script>
    function luckySearch() {
        const q = document.querySelector('.search-input').value;
        window.open('https://www.google.com/search?q=' + encodeURIComponent(q) + '&btnI=1', '_blank');
    }
</script>
{% endblock %}
