{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Google{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
    <nav class="top-nav">
        <div class="top-nav-links">
            <a href="https://mail.google.com" target="_blank">Gmail</a>
            <a href="https://www.google.com/imghp" target="_blank">Images</a>
            <button class="icon-btn" title="Google apps">
                <span class="material-symbols-outlined">apps</span>
            </button>
            <a href="https://accounts.google.com" target="_blank" class="signin-btn">Sign in</a>
        </div>
    </nav>

<body>
    {% block body %}{% endblock %}
</body>

<footer class="home-footer">
        <div class="footer-top">
            <span>Saudi Arabia</span>
        </div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="{% url 'mainApp:terms' %}">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>
</html>
